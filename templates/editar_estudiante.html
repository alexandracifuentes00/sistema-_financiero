<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Estudiante - CFT Tarapacá</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container" style="max-width: 600px; margin: 40px auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); font-family: sans-serif;">
    <h2 style="color: #0066cc; margin-bottom: 20px;">Editar Estudiante</h2>

    <form action="/actualizar_estudiante/{{ alumno[0] }}" method="POST" style="display: flex; flex-direction: column; gap: 15px;">
        <div>
            <label style="display: block; font-weight: bold; margin-bottom: 5px;">RUT:</label>
            <input type="text" name="rut" value="{{ alumno[3] }}" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px;">
        </div>
        <div>
            <label style="display: block; font-weight: bold; margin-bottom: 5px;">Nombre:</label>
            <input type="text" name="nombre" value="{{ alumno[1] }}" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px;">
        </div>
        <div>
            <label style="display: block; font-weight: bold; margin-bottom: 5px;">Apellido:</label>
            <input type="text" name="apellido" value="{{ alumno[2] }}" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px;">
        </div>
        <div>
            <label style="display: block; font-weight: bold; margin-bottom: 5px;">Dirección de Domicilio:</label>
            <input type="text" name="direccion" value="{{ alumno[5] if alumno[5] else '' }}" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px;">
        </div>>
        <div>
            <label style="display: block; font-weight: bold; margin-bottom: 5px;">Carrera:</label>
            <select name="carrera_id" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; height: 40px;">
                {% for carrera in carreras %}
                    <option value="{{ carrera[0] }}" {% if carrera[0] == alumno[4] %}selected{% endif %}>{{ carrera[1] }}</option>
                {% endfor %}
            </select>
        </div>

        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button type="submit" style="flex: 1; padding: 12px; background-color: #0066cc; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px;">
                Guardar Cambios
            </button>
            <a href="/estudiantes" style="padding: 12px; background-color: #666; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; text-align: center; font-size: 16px;">
                Cancelar
            </a>
        </div>
    </form>
</div>

</body>
</html>
