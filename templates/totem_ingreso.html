<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tótem de Consulta - CFT Tarapacá</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .totem-body {
            background: radial-gradient(circle, #1976D2, #0D47A1);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .totem-card {
            background: white;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            text-align: center;
            width: 100%;
            max-width: 500px;
        }
        .totem-card h1 { color: #0D47A1; font-size: 32px; margin-bottom: 5px; }
        .totem-card p { color: #555; font-size: 16px; margin-bottom: 25px; }
        
        /* Input del RUT gigante y centrado */
        .rut-input {
            font-size: 32px !important;
            padding: 15px !important;
            text-align: center;
            border-radius: 12px !important;
            border: 2px solid #ccc !important;
            width: 100%;
            margin-bottom: 25px;
            font-weight: bold;
            color: #333;
            letter-spacing: 1px;
            background-color: #fafafa;
        }
        
        /* Contenedor del Teclado Numérico */
        .teclado-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }
        
        /* Botones del Teclado */
        .btn-tecla {
            background: #f4f6f9;
            color: #333;
            border: 1px solid #ddd;
            padding: 20px;
            font-size: 26px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            user-select: none;
        }
        .btn-tecla:active {
            background: #e0e4ec;
            transform: scale(0.95);
        }
        .btn-accion-borrar {
            background: #FFEBEE;
            color: #C62828;
            border-color: #FFCDD2;
        }
        .btn-accion-borrar:active { background: #FFCDD2; }

        /* Botón de consultar abajo */
        .btn-consultar {
            font-size: 24px !important;
            padding: 18px !important;
            background: #4CAF50 !important;
            color: white;
            border: none;
            border-radius: 12px !important;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(76, 175, 80, 0.3);
        }
        .btn-consultar:hover { background: #43A047 !important; }

        .error-alerta {
            background: #FFEBEE; color: #C62828; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-weight: bold;
        }
    </style>
</head>
<body class="totem-body">

<div class="totem-card">
    <div class="logo">
        <img src="{{ url_for('static', filename='logo.png') }}" style="height: 110px; margin: 0 auto 15px auto; display: block;">
    </div>
    <h1>Consulta Financiera</h1>
    <p>Ingrese su RUT para ver su estado de cuenta</p>

    {% if error %}
        <div class="error-alerta">{{ error }}</div>
    {% endif %}

    <form action="/totem/consulta" method="POST" style="flex-direction: column; box-shadow: none; padding: 0; background: transparent;">
        <input type="text" id="rut" name="rut" class="rut-input" placeholder="00.000.000-0" required autocomplete="off">
        
        <div class="teclado-grid">
            <button type="button" class="btn-tecla" onclick="agregarNumero('1')">1</button>
            <button type="button" class="btn-tecla" onclick="agregarNumero('2')">2</button>
            <button type="button" class="btn-tecla" onclick="agregarNumero('3')">3</button>
            
            <button type="button" class="btn-tecla" onclick="agregarNumero('4')">4</button>
            <button type="button" class="btn-tecla" onclick="agregarNumero('5')">5</button>
            <button type="button" class="btn-tecla" onclick="agregarNumero('6')">6</button>
            
            <button type="button" class="btn-tecla" onclick="agregarNumero('7')">7</button>
            <button type="button" class="btn-tecla" onclick="agregarNumero('8')">8</button>
            <button type="button" class="btn-tecla" onclick="agregarNumero('9')">9</button>
            
            <button type="button" class="btn-tecla" onclick="agregarNumero('K')">K</button>
            <button type="button" class="btn-tecla" onclick="agregarNumero('0')">0</button>
            <button type="button" class="btn-tecla btn-accion-borrar" onclick="borrarNumero()">⌫</button>
        </div>

        <button type="submit" class="btn-consultar">🔍 Consultar Estado</button>
    </form>
</div>

<script>
    // Ahora leemos directamente lo que tenga el input para no perder sincronía
    function agregarNumero(caracter) {
        const inputRut = document.getElementById("rut");
        let valorActual = inputRut.value.replace(/[\.\-]/g, ""); // Quitamos puntos y guiones para contar el largo real
        
        if (valorActual.length >= 9) return; // Límite de RUT chileno
        
        valorActual += caracter;
        inputRut.value = formatearRut(valorActual);
    }

    function borrarNumero() {
        const inputRut = document.getElementById("rut");
        let valorActual = inputRut.value.replace(/[\.\-]/g, "");
        
        valorActual = valorActual.slice(0, -1);
        inputRut.value = formatearRut(valorActual);
    }

    // Formateador dinámico directo
    function formatearRut(rutLimpio) {
        if (rutLimpio.length === 0) return "";
        if (rutLimpio.length === 1) return rutLimpio;

        let cuerpo = rutLimpio.slice(0, -1);
        let dv = rutLimpio.slice(-1).toUpperCase();

        // Agrega los puntos de miles automáticamente
        cuerpo = cuerpo.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        
        return cuerpo + "-" + dv;
    }
</script>

</body>
</html>
