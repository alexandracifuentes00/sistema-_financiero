<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Pagos - CFT Tarapacá</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header style="display: flex; align-items: center; justify-content: space-between; padding: 5px 40px; background-color: #0066cc; color: white;">
    
    <div style="display: flex; align-items: center; gap: 20px;">
        <div class="logo">
            <img src="{{ url_for('static', filename='logo.png') }}" style="display: block; height: auto;">
        </div>
        <div>
            <h1 style="margin: 0; font-size: 28px; font-weight: bold;">Registro de Pagos</h1>
            <h3 style="margin: 5px 0 0 0; font-size: 16px; opacity: 0.9;">CFT Tarapacá</h3>
        </div>
    </div>

    <div>
        <a href="/inicio" style="display: inline-block; padding: 10px 20px; background-color: rgba(255, 255, 255, 0.2); color: white; text-decoration: none; border-radius: 5px; font-weight: bold; font-size: 14px; border: 1px solid rgba(255, 255, 255, 0.4); transition: background 0.3s;" onmouseover="this.style.backgroundColor='rgba(255,255,255,0.3)'" onmouseout="this.style.backgroundColor='rgba(255,255,255,0.2)'">
            ← Volver al Menú Principal
        </a>
    </div>
</header>

<div class="container" style="max-width: 1200px; margin: 20px auto; padding: 0 20px;">

    <h2>Ingresar Nuevo Pago</h2>

    <form action="/guardar_pago" method="POST" style="margin-bottom: 30px;">
        <input type="text" name="rut" placeholder="Rut (Ej: 12345678-9)" 
                pattern="^[0-9]{1,2}(\.?[0-9]{3}){2}-[0-9kK]{1}$" 
                title="El RUT debe incluir guion y dígito verificador." required>
        <input name="monto" placeholder="Monto" required>
        <input type="date" name="fecha" required>
        <button class="btn" type="submit">Guardar Pago</button>
    </form>

    <h2>Historial de Pagos</h2>
    
    <table>
    <thead>
        <tr>
            <th>ID</th>
            <th>RUT</th>
            <th>Nombre Alumno</th> <th>Monto</th>
            <th>Fecha</th>
        </tr>
    </thead>
    <tbody>
        {% for p in pagos %}
        <tr>
            <td>{{ loop.index }}</td> <td>{{ p[1] }}</td>       <td>{{ p[2] }}</td>       <td>${{ "{:,.0f}".format(p[3]).replace(',', '.') }}</td> <td>{{ p[4] }}</td>       </tr>
        {% endfor %}
    </tbody>
</table>

</div>

</body>
</html>
